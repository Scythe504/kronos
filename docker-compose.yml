version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: kronos_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: kronos_otel_lgtm
    restart: always
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    volumes:
      - lgtm_data:/data

volumes:
  postgres_data:
  lgtm_data:
